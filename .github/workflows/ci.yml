name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Type check (basic import validation)
      run: |
        python -c "
from core.base_agent import BaseAgent
from agents.lyra_agent import LyraAgent
from agents.xen_agent import XenAgent
from agents.nexus_orchestrator import NexusOrchestrator
print('✅ All agent imports successful')
print('BaseAgent:', BaseAgent)
print('NexusOrchestrator ready for Grok tool calling')
"

    - name: Run basic smoke test
      run: |
        python -c "
from agents.nexus_orchestrator import NexusOrchestrator
nexus = NexusOrchestrator()
print('NexusOrchestrator instantiated successfully')
print('Swarm members:', nexus.get_state('swarm_members'))
status = nexus.full_stack_status()
print('Full stack layers:', list(status.keys()))
print('✅ Smoke test passed')
"

    - name: Security / dependency check (optional future)
      run: echo "Add pip-audit or safety here in future iterations"
